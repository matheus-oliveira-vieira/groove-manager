default: &default
  adapter: postgresql
  encoding: unicode
  host: db
  username: postgres
  password: password
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: groove-manager_development


test:
  <<: *default
  database: groove-manager_test

production:
  url: <%= ENV["DATABASE_URL"] %>